name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  super-linter:
    name: All
    uses: harryzcy/github-actions/.github/workflows/linter.yml@a0dee436184d6eeacdc042b8487c78eb3186e1cd # main

  spelling:
    name: Spelling
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@a0dee436184d6eeacdc042b8487c78eb3186e1cd # main

  renovate:
    name: Renovate
    uses: harryzcy/github-actions/.github/workflows/renovate.yml@a0dee436184d6eeacdc042b8487c78eb3186e1cd # main
