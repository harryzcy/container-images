name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  super-linter:
    name: All
    uses: harryzcy/github-actions/.github/workflows/linter.yml@88f6d74880d1878315508426dde7a8aaf6cb3d88 # main

  spelling:
    name: Spelling
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@88f6d74880d1878315508426dde7a8aaf6cb3d88 # main

  renovate:
    name: Renovate
    uses: harryzcy/github-actions/.github/workflows/renovate.yml@88f6d74880d1878315508426dde7a8aaf6cb3d88 # main
