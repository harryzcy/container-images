name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  super-linter:
    name: All
    uses: harryzcy/github-actions/.github/workflows/linter.yml@13a4c40f9699ea2915746978b58bb42160f771b6 # main

  spelling:
    name: Spelling
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@13a4c40f9699ea2915746978b58bb42160f771b6 # main

  renovate:
    name: Renovate
    uses: harryzcy/github-actions/.github/workflows/renovate.yml@13a4c40f9699ea2915746978b58bb42160f771b6 # main
