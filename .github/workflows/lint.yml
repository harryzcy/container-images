name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  super-linter:
    name: All
    uses: harryzcy/github-actions/.github/workflows/linter.yml@3ce6f550e4cc0f77ae4ce84604c55e9b41dab049 # main

  spelling:
    name: Spelling
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@3ce6f550e4cc0f77ae4ce84604c55e9b41dab049 # main

  renovate:
    name: Renovate
    uses: harryzcy/github-actions/.github/workflows/renovate.yml@3ce6f550e4cc0f77ae4ce84604c55e9b41dab049 # main
